<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Car Manufacturing System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d1f3c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }
        .login-brand { text-align: center; margin-bottom: 32px; }
        .login-brand .icon { font-size: 48px; color: #1d4ed8; }
        .login-brand h2 { font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 700; color: #0f172a; letter-spacing: 1px; margin: 8px 0 4px; }
        .login-brand p { color: #64748b; font-size: 0.9rem; }
        .form-label { font-weight: 500; color: #374151; font-size: 0.9rem; }
        .form-control, .form-select {
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .input-icon { position: relative; }
        .input-icon i {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: #94a3b8; font-size: 1rem; z-index: 10;
        }
        .input-icon .form-control, .input-icon .form-select { padding-left: 38px; }
        .btn-login {
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            color: white; border: none; width: 100%;
            padding: 12px; border-radius: 10px; font-size: 1rem; font-weight: 600;
            transition: all 0.3s; letter-spacing: 0.5px;
        }
        .btn-login:hover { background: linear-gradient(135deg, #1e40af, #2563eb); transform: translateY(-1px); box-shadow: 0 4px 15px rgba(29,78,216,0.4); }
        .alert { border-radius: 10px; font-size: 0.9rem; }
        .default-creds { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; font-size: 0.85rem; color: #0369a1; }
        .default-creds strong { display: block; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <div class="icon"><i class="bi bi-car-front-fill"></i></div>
            <h2>CAR MANUFACTURING</h2>
            <p>System Management Portal</p>
        </div>

        <!-- Default credentials info box -->
        <div class="default-creds">
            <strong><i class="bi bi-info-circle me-1"></i>Default Credentials</strong>
            Username: <strong>admin</strong> &nbsp;|&nbsp; Password: <strong>admin123</strong>
        </div>

        <!-- Alert for errors -->
        <div id="alertBox" class="alert alert-danger d-none" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <span id="alertMsg">Invalid credentials</span>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-icon">
                    <i class="bi bi-person"></i>
                    <input type="text" class="form-control" id="username" placeholder="Enter username" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-icon">
                    <i class="bi bi-lock"></i>
                    <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Role</label>
                <div class="input-icon">
                    <i class="bi bi-shield-check"></i>
                    <select class="form-select" id="role">
                        <option value="Admin">Admin</option>
                        <option value="Manager">Manager</option>
                        <option value="Employee">Employee</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
        </form>
    </div>

    <script>
        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const role = document.getElementById('role').value;
            const loginBtn = document.getElementById('loginBtn');
            const alertBox = document.getElementById('alertBox');

            // Show loading state
            loginBtn.innerHTML = '<i class="bi bi-hourglass-split me-2"></i>Logging in...';
            loginBtn.disabled = true;
            alertBox.classList.add('d-none');

            try {
                // Send login request to backend API
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role })
                });

                const data = await response.json();

                if (data.success) {
                    // Save user info to localStorage for session
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('isLoggedIn', 'true');

                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    // Show error
                    document.getElementById('alertMsg').textContent = data.message || 'Invalid credentials';
                    alertBox.classList.remove('d-none');
                }
            } catch (err) {
                document.getElementById('alertMsg').textContent = 'Cannot connect to server. Make sure backend is running on port 3000.';
                alertBox.classList.remove('d-none');
            } finally {
                loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Login';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
