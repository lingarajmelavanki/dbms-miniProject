<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Manufacturing System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d1f3c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .hero { text-align: center; padding: 40px; }
        .brand-icon { font-size: 80px; margin-bottom: 20px; color: #3b82f6; }
        h1 { font-family: 'Rajdhani', sans-serif; font-size: 3rem; font-weight: 700; letter-spacing: 2px; }
        p { color: #94a3b8; margin: 15px 0 30px; font-size: 1.1rem; }
        .btn-enter {
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            color: white; border: none; padding: 14px 48px;
            border-radius: 50px; font-size: 1.1rem; font-weight: 500;
            text-decoration: none; display: inline-block;
            transition: all 0.3s; box-shadow: 0 4px 20px rgba(59,130,246,0.4);
        }
        .btn-enter:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59,130,246,0.6); color: white; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="brand-icon"><i class="bi bi-car-front-fill"></i></div>
        <h1>CAR MANUFACTURING SYSTEM</h1>
        <p>Complete management solution for modern car manufacturing operations</p>
        <a href="login.html" class="btn-enter"><i class="bi bi-arrow-right-circle me-2"></i>Enter System</a>
    </div>
    <script>
        // Auto redirect to login after 3 seconds
        setTimeout(() => { window.location.href = 'login.html'; }, 3000);
    </script>
</body>
</html>
